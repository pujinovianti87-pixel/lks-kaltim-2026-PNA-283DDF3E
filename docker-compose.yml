version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile

    ports:
      - "8000:8000"

    depends_on:
      - db
      - redis

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: lksdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    ports:
      - "6379:6379"

volumes:
  postgres_data: